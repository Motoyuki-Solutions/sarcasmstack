<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="3000" viewBox="0 0 3000 3000" aria-label="AI SURVIVOR KIT">
  
  <text x="1500" y="84" font-family="Impact, Arial Black, sans-serif" font-weight="900" font-size="110" fill="#ff5a1f" text-anchor="middle" letter-spacing="6">AI SURVIVOR KIT</text>
  <rect x="120" y="120" width="1320" height="1320" rx="48" fill="none" stroke="#ffffff" stroke-width="6" stroke-dasharray="24 16"/>
      <text x="780" y="678.0" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#ffffff" text-anchor="middle" >My job is safe.</text>
      <text x="780" y="819.6" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#ffffff" text-anchor="middle" >The AI can&apos;t sit</text>
      <text x="780" y="961.2" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#ffffff" text-anchor="middle" >in meetings.</text>
  <rect x="1560" y="120" width="1320" height="1320" rx="48" fill="none" stroke="#ffffff" stroke-width="6" stroke-dasharray="24 16"/>
      <text x="2220" y="536.4" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#ffffff" text-anchor="middle" >I don&apos;t fear the</text>
      <text x="2220" y="678.0" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#ffffff" text-anchor="middle" >AI. I fear the</text>
      <text x="2220" y="819.6" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#ffffff" text-anchor="middle" >manager who</text>
      <text x="2220" y="961.2" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#ffffff" text-anchor="middle" >thinks it</text>
      <text x="2220" y="1102.8" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#ffffff" text-anchor="middle" >replaces QA.</text>
  <rect x="120" y="1560" width="1320" height="1320" rx="48" fill="none" stroke="#ffffff" stroke-width="6" stroke-dasharray="24 16"/>
      <text x="780" y="1905.6" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#ffffff" text-anchor="middle" >Prompt Engineer:</text>
      <text x="780" y="2047.2" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#ffffff" text-anchor="middle" >&apos;I type things</text>
      <text x="780" y="2188.8" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#ffffff" text-anchor="middle" >into a box&apos;</text>
      <text x="780" y="2330.4" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#ffffff" text-anchor="middle" >wasn&apos;t</text>
      <text x="780" y="2472.0" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#ffffff" text-anchor="middle" >impressive</text>
      <text x="780" y="2613.6" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#ffffff" text-anchor="middle" >enough.</text>
  <rect x="1560" y="1560" width="1320" height="1320" rx="48" fill="none" stroke="#ffffff" stroke-width="6" stroke-dasharray="24 16"/>
      <text x="2220" y="2047.2" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#ffffff" text-anchor="middle" >The AI didn&apos;t</text>
      <text x="2220" y="2188.8" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#ffffff" text-anchor="middle" >replace me. It</text>
      <text x="2220" y="2330.4" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#ffffff" text-anchor="middle" >replaced my will</text>
      <text x="2220" y="2472.0" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="120" fill="#ffffff" text-anchor="middle" >to live.</text>
</svg>
