<svg xmlns="http://www.w3.org/2000/svg" width="4500" height="5400" viewBox="0 0 4500 5400" aria-label="I&apos;ve seen things you people wouldn&apos;t believe. Alerts firing at 4am. A dev who ran rm -rf in prod. All those moments will be lost in time, like tickets in ServiceNow.">
  
  <text x="2250" y="1066.7" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="328" fill="#ffffff" text-anchor="middle" >I&apos;ve seen things you</text>
      <text x="2250" y="1453.7" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="328" fill="#ffffff" text-anchor="middle" >people wouldn&apos;t</text>
      <text x="2250" y="1840.8" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="328" fill="#ffffff" text-anchor="middle" >believe. Alerts</text>
      <text x="2250" y="2227.8" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="328" fill="#ffffff" text-anchor="middle" >firing at 4am. A dev</text>
      <text x="2250" y="2614.9" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="328" fill="#ffffff" text-anchor="middle" >who ran rm -rf in</text>
      <text x="2250" y="3001.9" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="328" fill="#ffffff" text-anchor="middle" >prod. All those</text>
      <text x="2250" y="3388.9" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="328" fill="#ffffff" text-anchor="middle" >moments will be lost</text>
      <text x="2250" y="3776.0" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="328" fill="#ffffff" text-anchor="middle" >in time, like</text>
      <text x="2250" y="4163.0" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="328" fill="#ffffff" text-anchor="middle" >tickets in</text>
      <text x="2250" y="4550.1" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="328" fill="#ffffff" text-anchor="middle" >ServiceNow.</text>
</svg>
