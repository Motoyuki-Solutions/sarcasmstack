<svg xmlns="http://www.w3.org/2000/svg" width="4500" height="5400" viewBox="0 0 4500 5400" aria-label="It summarized the action items. It assigned them to me. It promoted itself.">
  
  <text x="2250" y="1969.3" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="360" fill="#ffffff" text-anchor="middle" >It summarized the</text>
      <text x="2250" y="2394.1" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="360" fill="#ffffff" text-anchor="middle" >action items. It</text>
      <text x="2250" y="2818.9" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="360" fill="#ffffff" text-anchor="middle" >assigned them to</text>
      <text x="2250" y="3243.7" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="360" fill="#ffffff" text-anchor="middle" >me. It promoted</text>
      <text x="2250" y="3668.5" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="360" fill="#ffffff" text-anchor="middle" >itself.</text>
