<svg xmlns="http://www.w3.org/2000/svg" width="4500" height="5400" viewBox="0 0 4500 5400" aria-label="I&apos;m not a human in the loop. I&apos;m the human who gets paged at 3am when the loop breaks.">
  
  <text x="2250" y="1969.3" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="360" fill="#ffffff" text-anchor="middle" >I&apos;m not a human in</text>
      <text x="2250" y="2394.1" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="360" fill="#ffffff" text-anchor="middle" >the loop. I&apos;m the</text>
      <text x="2250" y="2818.9" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="360" fill="#ffffff" text-anchor="middle" >human who gets</text>
      <text x="2250" y="3243.7" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="360" fill="#ffffff" text-anchor="middle" >paged at 3am when</text>
      <text x="2250" y="3668.5" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="360" fill="#ffffff" text-anchor="middle" >the loop breaks.</text>
